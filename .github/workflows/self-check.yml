name: self-check
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: ./gradlew build
      # hexagonal-rules 의 위반 픽스처에 규칙을 직접 돌려 리포트가 위반을 잡는지 증명
      - name: Run archrules on violation fixtures
        run: ./gradlew :hexagonal-rules:archRulesSelfCheck
      - name: Publish report
        if: always()
        run: cat hexagonal-rules/build/reports/archrules/report.md >> "$GITHUB_STEP_SUMMARY"
