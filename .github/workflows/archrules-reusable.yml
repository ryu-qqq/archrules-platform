name: archrules-reusable
on:
  workflow_call:
    inputs:
      classes-dir:
        description: '분석할 컴파일된 프로덕션 클래스 디렉토리'
        required: false
        default: 'build/classes/java/main'
        type: string
      threshold:
        description: '우선순위 게이트(HIGH|MEDIUM|LOW|none=report-only, 기본 none)'
        required: false
        default: 'none'
        type: string
      rules-version:
        description: 'archrules-platform 버전/태그 (예: 0.1.0)'
        required: true
        type: string

jobs:
  archrules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer
        uses: actions/checkout@v4
      - name: Checkout archrules-platform (init script)
        uses: actions/checkout@v4
        with:
          repository: ryu-qqq/archrules-platform
          ref: ${{ inputs.rules-version }}
          path: .archrules-platform
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compile consumer
        run: ./gradlew classes
      - name: Run archrules (injected init script)
        run: |
          ./gradlew --init-script .archrules-platform/ci/archrules.init.gradle \
            -ParchRulesVersion=${{ inputs.rules-version }} \
            -ParchRulesClasses=${{ inputs.classes-dir }} \
            -ParchRulesReport=build/reports/archrules/report.md \
            -ParchRulesThreshold=${{ inputs.threshold }} \
            archRulesCheck
        # ArchRulesCli exit: 2=규칙0개(silent-skip 가드), 1=threshold 위반 → 잡 실패
      - name: Publish report to job summary
        if: always()
        run: |
          if [ -f build/reports/archrules/report.md ]; then
            cat build/reports/archrules/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "archrules report 없음 (규칙 실행 실패?)" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archrules-report
          path: build/reports/archrules/report.md
          if-no-files-found: warn
